    <script>
        function change_number(button, action){

            const quantityControl = button.parentNode;
            const input =  quantityControl.querySelector('.quantity-input');
            let val = parseInt(input.value);
        
            if (action === 'increase') {
                if (val < 99) {
                    input.value = val + 1;
                    updateSubtotal(button);
                } 
            } else if (action === 'decrease') {
                if (val > 1) {
                    input.value = val - 1;
                    updateSubtotal(button);      
                }
            }
            

        }
        function updateSubtotal(button) {
       
        const row = button.closest('tr');
        
     
        const priceText = row.querySelector('.price-col').textContent;
        const price = parseFloat(priceText.replace('¥', ''));
        
        const quantity = parseInt(row.querySelector('.quantity-input').value);
        
        // 计算小计
        const subtotal = price * quantity;
        
        // 更新小计显示
        row.querySelector('.subtotal-col').textContent = '¥' + subtotal.toFixed(2);
        
        // 更新总计
        updateTotal();
    }

    // 添加更新总计的函数
    function updateTotal() {
        let total = 0;
        document.querySelectorAll('.item-check:checked').forEach(checkbox => {
            const row = checkbox.closest('tr');
            const subtotalText = row.querySelector('.subtotal-col').textContent;
            const value = parseFloat(subtotalText.replace('¥', ''));
            total += value;
        });
        document.getElementById('totalAmount').textContent = '¥' + total.toFixed(2);
    }

    // 添加删除商品的功能
    function removeItem(button) {
        if (confirm('确定要删除这个商品吗？')) {
            const row = button.closest('tr');
            row.remove();
            updateTotal();
        }
    }

    function toggleSelectAll() {
        const selectAllCheckbox = document.getElementById('footerCheckAll');
        const itemCheckboxes = document.querySelectorAll('.item-check');
        
        itemCheckboxes.forEach(checkbox => {
            checkbox.checked = selectAllCheckbox.checked;
        });
        
        // 更新总计
        updateTotal();
    }

    function updateSelectAllStatus() {
        const selectAllCheckbox = document.getElementById('footerCheckAll');
        const itemCheckboxes = document.querySelectorAll('.item-check');
        const checkedCheckboxes = document.querySelectorAll('.item-check:checked');
        
        // 如果所有复选框都被选中，全选按钮也选中；否则取消选中
        selectAllCheckbox.checked = itemCheckboxes.length === checkedCheckboxes.length;
        
        // 如果有选中的商品，更新总计；如果都没有选中，总计显示0
        updateTotal();
    }

    function initCheckboxEvents() {
        // 全选按钮点击事件
        document.getElementById('footerCheckAll').addEventListener('click', toggleSelectAll);
        
        // 为每个商品复选框添加点击事件
        document.querySelectorAll('.item-check').forEach(checkbox => {
            checkbox.addEventListener('click', function() {
                updateSelectAllStatus();
            });
        });
    }

    // 页面加载完成后初始化总计（确保显示正确）
    document.addEventListener('DOMContentLoaded', function() {
        updateTotal();
        initCheckboxEvents();
    });


    </script>
