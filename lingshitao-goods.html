    <script>
        function seeimg(imgElement) {
        
        const imgSrc = imgElement.src;
        const overlay = document.createElement('div');
        
        overlay.style.cssText = 'position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); display:flex; justify-content:center; align-items:center; z-index:9999; cursor:pointer;';
        
        const bigImg = document.createElement('img');
        bigImg.src = imgSrc;
        bigImg.style.cssText = 'max-width:60%; max-height:50%; object-fit:contain;';
        
        overlay.onclick = () => document.body.removeChild(overlay);
        overlay.appendChild(bigImg);
        document.body.appendChild(overlay);
    }


    function change_number(button, action){
        const input = document.querySelector('.number-input');
        let val = parseInt(input.value);
        
        if (action === 'increase') {
            if (val < 99) {
                input.value = val + 1;
            // } else {
            //     alert('最多购买99件');
            }
        } else if (action === 'decrease') {
            if (val > 1) {
                input.value = val - 1;
            // } else {
            //     alert('最少购买1件');
            }
        }

    }

    function selectSpec(element) {
       
        const button = element.closest('.category-button');
        const specButtons = document.querySelectorAll('.category-button');
        
        specButtons.forEach(btn => {
            btn.classList.remove('selected');
        });

        button.classList.add('selected');

        const specText = element.textContent;
        console.log('选中的规格：', specText);
    }

    document.addEventListener('DOMContentLoaded', function() {
        const firstSpec = document.querySelector('.category-button');
        if (firstSpec) {
            firstSpec.classList.add('selected');
        }
    });



    </script>
